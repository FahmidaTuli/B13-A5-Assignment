<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Main page</title>
  <!-- daisyUI and Tailwind -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <style>
    * {
      font-family: "Geist", sans-serif;
    }
  </style>

  <!-- icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
  <!-- navbar -->
  <header class="bg-base-100 shadow">
    <div class="flex justify-between px-20 py-[20.5px] mx-auto">
      <div class="flex justify-between gap-1">
        <img class="w-9 h-[37px]" src="./assets/github-logo.png" alt="">
        <h1 class=" text-[24px] font-semibold text-[#1F2937]">GitHub Issues Tracker</h1>
      </div>
      <div class="flex justify-between gap-4">
        <input type="text" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto" />
        <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>
      </div>
    </div>
  </header>

  <main class="w-[80%] mx-auto pt-[60px]">

    <!-- button -->
    <section class="gap-1 p-6 bg-amber-50" >
      <button class="btn btn-primary w-[120px] ">All</button>

      <!-- Categories container -->
      <div id="categoriesContainer">
        <!-- Categories will be dynamically loaded here by JS  -->
      </div>
    </section>

    <!-- card -->
    <section>

    </section>
  </main>

  <script src="./script.js"></script>
</body>

</html>
